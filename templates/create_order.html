{% extends "index.html" %}

{% block content %}
    <h1>Создание разнарядки</h1>
    <form action="" method="post">
        {% csrf_token %}
        {% for pile in piles %}
        <div>
            <label for="pile_{{forloop.counter}}">{{ pile.name.name }} {{ pile.size }}</label>
            <input type="number" id="pile_{{forloop.counter}}" name="pile_{{pile.id}}" min="0" value="0">
        </div>
        {% endfor %}
        <input type="submit" value="Submit">
    </form>
{%endblock%}
